services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER_DIRECT:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD_DIRECT:-postgres}
      POSTGRES_DB: ${DB_NAME_DIRECT:-remez}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_DIRECT:-postgres} -d ${DB_NAME_DIRECT:-remez}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    env_file:
      - .env
    build:
      context: ./backend
      dockerfile: dockerfile
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/analysis/management/commands/output:/app/analysis/management/commands/output
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      pipeline-api:
        condition: service_started
    environment:
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key}
      SIGNING_KEY: ${SIGNING_KEY:-local-dev-signing-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8600}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8600}
      PASSWORD_RESET_CONFIRM_REDIRECT_BASE_URL: ${PASSWORD_RESET_CONFIRM_REDIRECT_BASE_URL:-http://localhost:8600/password-reset/confirm/}
      DB_HOST: db
      DB_HOST_DIRECT: db
      DB_HOST_POOLED: db
      DB_PORT: 5432
      DB_PORT_DIRECT: 5432
      DB_PORT_POOLED: 5432
      DB_NAME: ${DB_NAME_DIRECT:-remez}
      DB_NAME_DIRECT: ${DB_NAME_DIRECT:-remez}
      DB_USER: ${DB_USER_DIRECT:-postgres}
      DB_USER_DIRECT: ${DB_USER_DIRECT:-postgres}
      DB_USER_POOLED: ${DB_USER_DIRECT:-postgres}
      DB_PASSWORD_DIRECT: ${DB_PASSWORD_DIRECT:-postgres}
      DB_PASSWORD: ${DB_PASSWORD_DIRECT:-postgres}
      JWT_AUTH_SECURE: ${JWT_AUTH_SECURE:-True}
      JWT_AUTH_HTTPONLY: ${JWT_AUTH_HTTPONLY:-True}
      PIPELINE_BASE_URL: http://pipeline-api:8000
      PIPELINE_SERVICE_IPS: pipeline-api,127.0.0.1

      FAERS_FROM: ${FAERS_FROM}
      FAERS_TO: ${FAERS_TO} # Not load any data by default.
      FAERS_AUTO_SYNC: ${FAERS_AUTO_SYNC:-True}

  faers-init:
    profiles: ["manual"]
    build:
      context: ./backend
      dockerfile: dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME_DIRECT:-remez}
      DB_USER: ${DB_USER_DIRECT:-postgres}
      DB_PASSWORD: ${DB_PASSWORD_DIRECT:-postgres}

      FAERS_FROM: ${FAERS_FROM:-}
      FAERS_TO: ${FAERS_TO:-}
      FAERS_AUTO_SYNC: ${FAERS_AUTO_SYNC:-False}
    command: ["sh", "-c", "if [ -n \"$FAERS_FROM\" ] && [ -n \"$FAERS_TO\" ]; then python manage.py download_faers_data $FAERS_FROM $FAERS_TO && python manage.py load_faers_terms $FAERS_FROM $FAERS_TO; else echo 'FAERS sync skipped'; fi"]

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HOST: 0.0.0.0
      REACT_APP_API_BASE: /api/v1
      REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID}
      REACT_APP_GOOGLE_REDIRECT_URI: ${REACT_APP_GOOGLE_REDIRECT_URI}

  pipeline-api:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - ./pipeline/logs:/app/logs
      - ./pipeline/data/external/faers:/app/data/external/faers
    environment:
      PYTHONUNBUFFERED: "1"
      HOST: 0.0.0.0
      PORT: 8000
      PIPELINE_CALLBACK_URL: http://backend:8000/api/v1/analysis/results/update-by-task
      FAERS_FROM: ${FAERS_FROM}
      FAERS_TO: ${FAERS_TO}
      FAERS_AUTO_SYNC: ${FAERS_AUTO_SYNC:-True}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8600:8600"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  db_data:
