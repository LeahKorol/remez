services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER_DIRECT}
      POSTGRES_PASSWORD: ${DB_PASSWORD_DIRECT}
      POSTGRES_DB: ${DB_NAME_DIRECT}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_HOST_DIRECT: db
      DB_HOST_POOLED: db
      DB_PORT: 5432
      DB_PORT_DIRECT: 5432
      DB_PORT_POOLED: 5432
      DB_NAME: ${DB_NAME_DIRECT:-remez}
      DB_NAME_DIRECT: ${DB_NAME_DIRECT:-remez}
      DB_USER: ${DB_USER_DIRECT:-postgres}
      DB_USER_DIRECT: ${DB_USER_DIRECT:-postgres}
      DB_USER_POOLED: ${DB_USER_DIRECT:-postgres}
      DB_PASSWORD_DIRECT: ${DB_PASSWORD_DIRECT:-postgres}
      DB_PASSWORD: ${DB_PASSWORD_DIRECT:-postgres}
      JWT_AUTH_SECURE: ${JWT_AUTH_SECURE:-True}
      JWT_AUTH_HTTPONLY: ${JWT_AUTH_HTTPONLY:-True}

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  pipeline-api:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - ./pipeline:/app
    environment:
      PYTHONUNBUFFERED: "1"
      HOST: 0.0.0.0
      PORT: 8000
      PIPELINE_CALLBACK_URL: http://backend:8000/api/v1/analysis/results/update-by-task
    restart: unless-stopped

volumes:
  db_data:
